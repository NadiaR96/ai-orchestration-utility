# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ Setup NLTK resources
    - name: Setup NLTK
      run: python utils/setup_nltk.py

    # 5️⃣ Run unit tests only (exclude integration)
    - name: Run unit tests
      run: python -m unittest discover -s tests/unit -p "test_*.py" -v

    # 6️⃣ Build Docker image
    - name: Build Docker image
      run: docker build -t ai-orchestration-utility:latest .

    # 7️⃣ Run Docker container to verify tests
    - name: Run Docker container
      run: docker run --rm ai-orchestration-utility:latest

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ Setup NLTK resources
    - name: Setup NLTK
      run: python utils/setup_nltk.py

    # 5️⃣ Run integration tests (with HF token if available)
    - name: Run integration tests
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python -m unittest discover -s tests/integration -p "test_*.py" -v
