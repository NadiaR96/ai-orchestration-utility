name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4️⃣ Run unit tests only (exclude integration)
    - name: Run unit tests
      run: |
        python -m unittest discover -s tests -p "test_*.py" -v

    # 5️⃣ Optional: Build Docker image
    - name: Build Docker Image
      run: docker build -t ai-orchestration-utility:latest .

    # 6️⃣ Optional: Run Docker container to execute tests
    - name: Run Docker container
      run: docker run --rm ai-orchestration-utility:latest